<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>基金范围 - 登录</title>
<link rel="stylesheet" href="/css/fontawesome.min.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: #f5f5f0; color: #2d2a26;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.login-container { width: 100%; max-width: 400px; padding: 20px; }
.login-box {
    background: #fff; border-radius: 12px; padding: 40px 32px;
    border: 1px solid #e8e0d4;
}
.login-box .brand {
    font-size: 22px; font-weight: 700; color: #c7883c;
    text-align: center; margin-bottom: 4px;
}
.login-box .brand i { margin-right: 8px; }
.login-box .subtitle {
    text-align: center; color: #b5aea0; font-size: 13px; margin-bottom: 28px;
}
.form-group { margin-bottom: 18px; }
.form-group label {
    display: block; font-size: 13px; color: #5a544a; margin-bottom: 6px;
}
.form-group input {
    width: 100%; padding: 10px 14px; background: #fafaf8;
    border: 1px solid #e0d8cc; border-radius: 8px; color: #2d2a26;
    font-size: 15px; outline: none; transition: border-color 0.2s;
}
.form-group input:focus { border-color: #c7883c; background: #fff; }
.form-group input::placeholder { color: #b5aea0; }
.code-row { display: flex; gap: 8px; }
.code-row input { flex: 1; }
.code-row button {
    white-space: nowrap; padding: 0 16px; background: #f5f5f0;
    color: #5a544a; border: 1px solid #e0d8cc; border-radius: 8px;
    cursor: pointer; font-size: 13px; transition: all 0.2s;
}
.code-row button:hover { border-color: #c7883c; color: #c7883c; }
.code-row button:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary {
    width: 100%; padding: 11px; background: #c7883c; color: #fff;
    border: none; border-radius: 6px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
}
.btn-primary:hover { background: #b07630; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.error {
    background: #fef2f2; color: #b91c1c; padding: 10px 14px;
    border: 1px solid #fecaca; border-radius: 8px; font-size: 13px;
    margin-bottom: 16px; display: none;
}
.error.show { display: block; }
.success {
    background: #f0fdf4; color: #15803d; padding: 10px 14px;
    border: 1px solid #bbf7d0; border-radius: 8px; font-size: 13px;
    margin-bottom: 16px; display: none;
}
.success.show { display: block; }
.tab-bar {
    display: flex; margin-bottom: 20px; border-bottom: 1px solid #e8e0d4;
}
.tab {
    flex: 1; text-align: center; padding: 10px; cursor: pointer;
    color: #b5aea0; font-size: 14px; font-weight: 500;
    border-bottom: 2px solid transparent; transition: all 0.2s;
}
.tab:hover { color: #5a544a; }
.tab.active { color: #c7883c; border-bottom-color: #c7883c; }
</style>
</head>
<body>
<div class="login-container">
<div class="login-box">
    <div class="brand"><i class="fas fa-chart-line"></i> 基金范围</div>
    <div class="subtitle">登录后即可查看持仓数据</div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('login')">登录</div>
        <div class="tab" onclick="switchTab('register')">注册</div>
    </div>

    <div id="message" class="error"></div>

    <!-- 登录表单 -->
    <form id="loginForm" onsubmit="return doLogin(event)">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="loginEmail" placeholder="请输入邮箱" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">登 录</button>
    </form>

    <!-- 注册表单 -->
    <form id="registerForm" onsubmit="return doRegister(event)" style="display:none">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="regEmail" placeholder="请输入邮箱" required>
        </div>
        <div class="form-group">
            <label>验证码</label>
            <div class="code-row">
                <input type="text" id="regCode" placeholder="6 位验证码" maxlength="6" required>
                <button type="button" id="sendCodeBtn" onclick="sendCode()">获取验证码</button>
            </div>
        </div>
        <div class="form-group">
            <label>设置密码</label>
            <input type="password" id="regPassword" placeholder="至少 6 位" required>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="regPassword2" placeholder="再次输入密码" required>
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">注 册</button>
    </form>
</div>
</div>

<script>
const API = '';

function $(id) { return document.getElementById(id); }

function showMsg(msg, isError = true) {
    const el = $('message');
    el.textContent = msg;
    el.className = (isError ? 'error' : 'success') + ' show';
}
function hideMsg() { $('message').className = 'error'; }

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.trim() === (tab === 'login' ? '登录' : '注册')));
    $('loginForm').style.display = tab === 'login' ? '' : 'none';
    $('registerForm').style.display = tab === 'register' ? '' : 'none';
    hideMsg();
}

function saveToken(token) {
    localStorage.setItem('fund_token', token);
}

// 发送验证码
let codeTimer = null;
async function sendCode() {
    const email = $('regEmail').value.trim();
    if (!email || !email.includes('@')) { showMsg('请输入有效邮箱'); return; }
    const btn = $('sendCodeBtn');
    btn.disabled = true;
    btn.textContent = '发送中...';

    try {
        const res = await fetch(API + '/api/auth/send-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.success) {
            showMsg('验证码已发送到邮箱', false);
            // 60 秒倒计时
            let sec = 60;
            codeTimer = setInterval(() => {
                sec--;
                btn.textContent = sec + 's';
                if (sec <= 0) {
                    clearInterval(codeTimer);
                    btn.disabled = false;
                    btn.textContent = '重新发送';
                }
            }, 1000);
        } else {
            showMsg(data.message || '发送失败');
            btn.disabled = false;
            btn.textContent = '获取验证码';
        }
    } catch (e) {
        showMsg('网络错误: ' + e.message);
        btn.disabled = false;
        btn.textContent = '获取验证码';
    }
}

// 登录
async function doLogin(e) {
    e.preventDefault();
    const email = $('loginEmail').value.trim();
    const password = $('loginPassword').value;
    const btn = $('loginBtn');
    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
        const res = await fetch(API + '/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.token) {
            saveToken(data.token);
            window.location.href = '/';
        } else {
            showMsg(data.error || '登录失败');
            btn.disabled = false;
            btn.textContent = '登 录';
        }
    } catch (e) {
        showMsg('网络错误: ' + e.message);
        btn.disabled = false;
        btn.textContent = '登 录';
    }
}

// 注册
async function doRegister(e) {
    e.preventDefault();
    const email = $('regEmail').value.trim();
    const code = $('regCode').value.trim();
    const password = $('regPassword').value;
    const password2 = $('regPassword2').value;
    if (password !== password2) {
        showMsg('两次密码输入不一致');
        return;
    }
    if (!/^(?=.*[a-zA-Z])(?=.*\d).{6,}$/.test(password)) {
        showMsg('密码需至少 6 位，包含字母和数字');
        return;
    }
    const btn = $('registerBtn');
    btn.disabled = true;
    btn.textContent = '注册中...';

    try {
        const res = await fetch(API + '/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code, password })
        });
        const data = await res.json();
        if (data.token) {
            saveToken(data.token);
            showMsg('注册成功，正在进入...', false);
            setTimeout(() => window.location.href = '/', 800);
        } else {
            showMsg(data.error || '注册失败');
            btn.disabled = false;
            btn.textContent = '注 册';
        }
    } catch (e) {
        showMsg('网络错误: ' + e.message);
        btn.disabled = false;
        btn.textContent = '注 册';
    }
}

// 检查是否已登录，已登录直接跳转首页
(async function() {
    const token = localStorage.getItem('fund_token');
    if (token) {
        try {
            const res = await fetch(API + '/api/auth/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) {
                window.location.href = '/';
            }
        } catch(e) {}
        return;
    }
    // dev mode auto login
    try {
        const devResp = await fetch('/api/auth/dev-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        const devData = await devResp.json();
        if (devData && devData.token) {
            localStorage.setItem('fund_token', devData.token);
            window.location.href = '/';
        }
    } catch (e) {}
})();
</script>
</body>
</html>
