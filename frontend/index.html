<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#0B0E17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="基金范围">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>基金范围</title>
<!-- Chart.js: 本地优先，CDN 备用 -->
<script src="/js/chart.umd.min.js"></script>
<script>if(typeof Chart==='undefined')document.write('<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"><\/script>')</script>
<!-- Font Awesome: 本地优先，CDN 备用 -->
<link rel="stylesheet" href="/css/fontawesome.min.css" onerror="this.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css'">
<link rel="stylesheet" href="/css/style.css?v=7">
<!-- Markdown 渲染 -->
<script src="/js/marked.min.js" onerror="this.src='https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js'"></script>
<script src="/js/dompurify.min.js" onerror="this.src='https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js'"></script>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="brand"><i class="fas fa-chart-line"></i> 基金范围</div>
  <nav class="nav" id="nav">
    <a class="nav-item active" data-page="dashboard"><i class="fas fa-th-large"></i> 概览</a>
    <a class="nav-item" data-page="portfolio"><i class="fas fa-briefcase"></i> 持仓</a>
    <a class="nav-item" data-page="watchlist"><i class="fas fa-star"></i> 自选</a>
    <a class="nav-item" data-page="analysis"><i class="fas fa-search"></i> 分析</a>
    <a class="nav-item" data-page="predict"><i class="fas fa-brain"></i> 智能预测</a>
    <a class="nav-item" data-page="transactions"><i class="fas fa-receipt"></i> 交易记录</a>
    <a class="nav-item" data-page="screener"><i class="fas fa-filter"></i> 基金筛选</a>
    <a class="nav-item" data-page="compare"><i class="fas fa-balance-scale"></i> 对比</a>
    <a class="nav-item" data-page="penetration"><i class="fas fa-crosshairs"></i> 组合穿透</a>
    <a class="nav-item" data-page="dca"><i class="fas fa-calendar-alt"></i> 定投规划</a>
    <a class="nav-item" data-page="tools"><i class="fas fa-calculator"></i> 工具</a>
    <a class="nav-item" data-page="ai"><i class="fas fa-robot"></i> AI 助手</a>
    <a class="nav-item" data-page="settings"><i class="fas fa-cog"></i> 设置</a>
  </nav>
  <div class="sidebar-footer">
    <a onclick="logout()" class="logout-link"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
  </div>
</aside>
<main class="main">
  <header class="topbar">
    <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show')"><i class="fas fa-bars"></i></button>
    <div>
      <h1 id="pageTitle">概览</h1>
      <span class="subtitle" id="pageSubtitle">今日数据 · 实时估算</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="topbar-time"><i class="fas fa-clock"></i> 最后更新 <span id="lastRefreshTime">--:--</span></span>
      <button class="btn btn-primary" onclick="clearCache()"><i class="fas fa-sync-alt"></i> 刷新数据</button></div>
  </header>
  <div class="content" id="content"></div>
</main>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('show')"></div>
<div class="toast" id="toast"></div>
<script src="/js/app.js?v=22"></script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered:', reg.scope);
        }).catch(err => {
            console.warn('SW registration failed:', err);
        });
    });
}
</script>
</body>
</html>
