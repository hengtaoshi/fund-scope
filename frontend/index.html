<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>基金驾驶舱</title>
<!-- Chart.js: 本地优先，CDN 备用 -->
<script src="/js/chart.umd.min.js"></script>
<script>if(typeof Chart==='undefined')document.write('<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"><\/script>')</script>
<!-- Font Awesome: 本地优先，CDN 备用 -->
<link rel="stylesheet" href="/css/fontawesome.min.css" onerror="this.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css'">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="brand"><i class="fas fa-chart-line"></i> 基金驾驶舱</div>
  <nav class="nav" id="nav">
    <a class="nav-item active" data-page="dashboard"><i class="fas fa-th-large"></i> 概览</a>
    <a class="nav-item" data-page="portfolio"><i class="fas fa-briefcase"></i> 持仓</a>
    <a class="nav-item" data-page="analysis"><i class="fas fa-search"></i> 分析</a>
    <a class="nav-item" data-page="predict"><i class="fas fa-brain"></i> 智能预测</a>
    <a class="nav-item" data-page="tools"><i class="fas fa-calculator"></i> 工具</a>
    <a class="nav-item" data-page="settings"><i class="fas fa-cog"></i> 设置</a>
  </nav>
  <div class="sidebar-footer" style="padding:12px 20px;border-top:1px solid #e8e0d4;">
    <div id="sidebarFooter" style="font-size:12px;color:#b5aea0;margin-bottom:8px;">数据加载中...</div>
    <a onclick="logout()" style="cursor:pointer;font-size:12px;color:#b5aea0;display:flex;align-items:center;gap:6px;transition:color 0.2s;" onmouseover="this.style.color='#b91c1c'" onmouseout="this.style.color='#b5aea0'"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
  </div>
</aside>
<main class="main">
  <header class="topbar">
    <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
    <div>
      <h1 id="pageTitle">概览</h1>
      <span class="subtitle" id="pageSubtitle">今日数据 · 实时估算</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:12px;color:#99948b;"><i class="fas fa-clock"></i> 最后更新 <span id="lastRefreshTime">--:--</span></span>
      <button class="btn btn-primary" onclick="clearCache()"><i class="fas fa-sync-alt"></i> 刷新数据</button></div>
  </header>
  <div class="content" id="content"></div>
</main>
<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
</body>
</html>
