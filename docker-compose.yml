# ============================================
# 基金驾驶舱 — Docker Compose
# 服务：Flask + Nginx 反向代理
# ============================================

services:
  # ---- Flask 后端（宿主机 Nginx 反代，无需额外 Nginx 容器） ----
  flask:
    build: .
    container_name: fund-cockpit-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - fund_data:/app/backend/data
      - /root/fund-cockpit:/root/fund-cockpit
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.git-credentials:/root/.git-credentials:ro
      - /usr/bin/docker:/usr/local/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/local/lib/docker/cli-plugins:ro
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_SERVER=${SMTP_SERVER:-smtp.163.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - FROM_NAME=${FROM_NAME:-基金驾驶舱}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - PROJECT_DIR=/root/fund-cockpit
      - DEPLOY_NOTIFY_EMAIL=${DEPLOY_NOTIFY_EMAIL}

volumes:
  # SQLite 数据库 + 缓存数据持久化
  fund_data:
